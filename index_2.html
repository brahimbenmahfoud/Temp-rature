<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مدجنة العشي - مراقبة الحرارة</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    min-height: 100vh;
    color: #fff;
    padding: 20px;
  }
  header {
    text-align: center;
    margin-bottom: 30px;
  }
  header h1 {
    font-size: 1.8rem;
    margin-bottom: 5px;
  }
  #status {
    font-size: 0.9rem;
    color: #ccc;
  }
  #status.connected { color: #4ade80; }
  #status.disconnected { color: #f87171; }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
    max-width: 900px;
    margin: 0 auto;
  }
  .card {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 16px;
    padding: 25px;
    text-align: center;
    backdrop-filter: blur(10px);
    transition: transform 0.2s;
  }
  .card:hover { transform: translateY(-4px); }
  .card h2 {
    font-size: 1rem;
    color: #aad;
    margin-bottom: 15px;
    font-weight: 500;
  }
  .temp-value {
    font-size: 3rem;
    font-weight: bold;
  }
  .temp-unit {
    font-size: 1.5rem;
    color: #ccc;
  }
  .last-update {
    font-size: 0.8rem;
    color: #999;
    margin-top: 10px;
  }
  .temp-normal { color: #4ade80; }
  .temp-warning { color: #fbbf24; }
  .temp-danger { color: #f87171; }
  .temp-na { color: #777; }
</style>
</head>
<body>

<header>
  <h1>🐔 مدجنة العشي - مراقبة الحرارة</h1>
  <div id="status" class="disconnected">جاري الاتصال...</div>
</header>

<div class="grid">
  <div class="card">
    <h2>Poulailler 1 - بداية المدجنة</h2>
    <div class="temp-value temp-na" id="temp-debut">--</div>
    <div class="temp-unit">°C</div>
    <div class="last-update" id="time-debut">بانتظار القراءة...</div>
  </div>

  <div class="card">
    <h2>Poulailler 1 - آخر المدجنة</h2>
    <div class="temp-value temp-na" id="temp-fin">--</div>
    <div class="temp-unit">°C</div>
    <div class="last-update" id="time-fin">بانتظار القراءة...</div>
  </div>
</div>

<script>
// ---------- إعدادات MQTT (HiveMQ Cloud over WebSocket) ----------
const MQTT_HOST = "3924e1f72e944a159bf930ffd0d13bcd.s1.eu.hivemq.cloud";
const MQTT_PORT = 8884; // بورت WebSocket Secure متاع HiveMQ Cloud
const MQTT_USER = "Brahim";
const MQTT_PASS = "RatylBaker2427@";

const TOPIC_DEBUT = "bbm/3achi/poulailler1/temperature_debut";
const TOPIC_FIN   = "bbm/3achi/poulailler1/temperature_fin";

const statusEl = document.getElementById("status");
const tempDebutEl = document.getElementById("temp-debut");
const tempFinEl = document.getElementById("temp-fin");
const timeDebutEl = document.getElementById("time-debut");
const timeFinEl = document.getElementById("time-fin");

function setTempClass(el, value) {
  el.classList.remove("temp-normal", "temp-warning", "temp-danger", "temp-na");
  if (value === null || isNaN(value)) {
    el.classList.add("temp-na");
  } else if (value < 18 || value > 32) {
    el.classList.add("temp-danger");
  } else if (value < 22 || value > 28) {
    el.classList.add("temp-warning");
  } else {
    el.classList.add("temp-normal");
  }
}

function formatTime() {
  const now = new Date();
  return "آخر تحديث: " + now.toLocaleTimeString("ar-TN");
}

// اتصال عبر WebSocket Secure
const client = mqtt.connect(`wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`, {
  username: MQTT_USER,
  password: MQTT_PASS,
  clientId: "webdash_" + Math.random().toString(16).substr(2, 8),
  clean: true,
  reconnectPeriod: 3000
});

client.on("connect", () => {
  statusEl.textContent = "متصل ✓";
  statusEl.className = "connected";
  client.subscribe(TOPIC_DEBUT);
  client.subscribe(TOPIC_FIN);
});

client.on("reconnect", () => {
  statusEl.textContent = "جاري إعادة الاتصال...";
  statusEl.className = "disconnected";
});

client.on("close", () => {
  statusEl.textContent = "غير متصل";
  statusEl.className = "disconnected";
});

client.on("error", (err) => {
  console.error("MQTT error:", err);
  statusEl.textContent = "خطأ في الاتصال";
  statusEl.className = "disconnected";
});

client.on("message", (topic, message) => {
  const value = parseFloat(message.toString());

  if (topic === TOPIC_DEBUT) {
    tempDebutEl.textContent = isNaN(value) ? "--" : value.toFixed(1);
    setTempClass(tempDebutEl, value);
    timeDebutEl.textContent = formatTime();
  } else if (topic === TOPIC_FIN) {
    tempFinEl.textContent = isNaN(value) ? "--" : value.toFixed(1);
    setTempClass(tempFinEl, value);
    timeFinEl.textContent = formatTime();
  }
});
</script>

</body>
</html>
